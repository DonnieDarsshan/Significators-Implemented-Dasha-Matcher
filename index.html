/* ======================================

function getUntenantedPlanets(){

  if(!window.__lastSwissData) return [];

  const ninePlanets=[
    "Surya","Chandra","Mangala","Budha",
    "Jupiter","Venus","Saturn","Rahu","Ketu"
  ];

  let appearing=new Set();

  /* check which planets appear as STAR LORD of others */
  ninePlanets.forEach(p=>{
    let star=getStarLord(p);
    if(star && ninePlanets.includes(star)){
      appearing.add(star);
    }
  });

  /* planets that NEVER appear as star lord */
  return ninePlanets.filter(p=>!appearing.has(p));
}




function shouldIgnoreStarLord(p, forceUntenanted = false){

  if(!document.getElementById("ignoreUntenanted")?.checked && !forceUntenanted) return false;

  let untenanted=getUntenantedPlanets();

}

  let untenanted=getUntenantedPlanets();

/* ======================================

function getCuspAbsolute(cuspNum) {
  const data = window.__lastSwissData;
  if (!data) return null;
  
  if (document.getElementById("equalMode")?.checked) {
    // DYNAMIC PIVOT FIX: Anchor to the selected planet
    let pivot = document.getElementById("kundaliPivot")?.value || "Lagna";
    let pivotAbs = getAbsDeg(pivot);
    if (pivotAbs == null) return null;
    // Calculate equal 30-degree slices exactly from Pivot
    return (pivotAbs + (cuspNum - 1) * 30) % 360;
  }
  
  // Default Placidus from JSON
  return data.cusps ? data.cusps[cuspNum] : null;
}

      if(dispHouse) result.push(parseInt(dispHouse));

      // Add Dispositor's Owned Houses
      for(let i=0;i<12;i++){
        let s=ZODIAC_ORDER[(pivotSignIndex+i)%12];
        if(SIGN_LORDS[s]===dispositor){
          result.push(i+1);
        }
      }
    }

    // 2. Aspecting Planets Logic (Placed House + Owned Houses)
    let targetHouse = getPlanetHouse(entity);
    if(targetHouse){
      let standardPlanets = ["Surya", "Chandra", "Mangala", "Budha", "Jupiter", "Venus", "Saturn"];
      
      standardPlanets.forEach(p => {
        let aspects = getAspectHouses(p);
        
        // If this planet's aspects include the house where Rahu/Ketu is sitting
        if(aspects && aspects.split(",").includes(String(targetHouse))){
          
          // Add Aspecting Planet's Placed House
          let aspectorHouse = getPlanetHouse(p);
          if(aspectorHouse) result.push(parseInt(aspectorHouse));

          // Add Aspecting Planet's Owned Houses
          for(let i=0;i<12;i++){
            let s=ZODIAC_ORDER[(pivotSignIndex+i)%12];
            if(SIGN_LORDS[s]===p){
              result.push(i+1);
            }
          }
        }
      });
    }

  } else {
    // Standard logic for the other 7 planets
    for(let i=0;i<12;i++){
      let sign=ZODIAC_ORDER[(pivotSignIndex+i)%12];
      if(SIGN_LORDS[sign]===entity){
        result.push(i+1);
      }
    }
  }

  // Remove duplicates and sort sequentially
  let uniqueResult = [...new Set(result)].sort((a,b) => a - b);

  return uniqueResult.join(",") || "-";
}



















function getConjunctPlanets(entity){
if(entity.includes("CSL")) return "-";

  let abs=getShiftedDeg(entity);
  if(abs==null) return "-";

  let result=[];

  planets
  .filter(p=>p!=="Lagna" && p!==entity && !p.includes("CSL"))
  .forEach(other=>{

    let otherAbs=getShiftedDeg(other);
    if(otherAbs==null) return;

    let diff=Math.abs(abs-otherAbs);
    if(diff>180) diff=360-diff;

	  if(diff<=12){   // 12° orb
	  let placedHouse = getPlanetHouse(other) || "-";

	  // Rahu & Ketu → show only house
	  if(other==="Rahu" || other==="Ketu"){
		result.push(`${other}(${placedHouse})`);
	  }else{
		let lords=getLordsOf(other);
		result.push(`${other}(${placedHouse},${lords||"-"})`);
	  }
	}



  });

  return result.join(" ") || "-";
}





function getCuspalConjunct(entity){
  let abs=getShiftedDeg(entity);
  if(abs==null) return "-";

  const data=window.__lastSwissData;
  if(!data || (!data.cusps && !document.getElementById("equalMode")?.checked)) return "-";

  let result=[];

  for(let i=1; i<=12; i++){

    let c = i.toString();
    
    if(typeof cuspAbs!=="number") continue;

    let shifted=(cuspAbs+getGlobalOffset()+360)%360;

    let diff=Math.abs(abs-shifted);
    if(diff>180) diff=360-diff;

    if(diff<=3){

}

function getStarLord(entity){
  let abs = getAbsDeg(entity);
  if(abs === null) return "";

  // 360 degrees / 27 nakshatras = 13.3333...
  let nakIndex = Math.floor(abs / (360/27));
  return NAKSHATRA_LORDS[nakIndex] || "";
}

function getSubLord(entity){
  let abs = getAbsDeg(entity);
  if(abs === null) return "";

  let nakSize = 360 / 27; // 13.333333 degrees per nakshatra
  let nakIndex = Math.floor(abs / nakSize);
  let nakLord = NAKSHATRA_LORDS[nakIndex];

  // Get Vimshottari sequence starting from the Nakshatra Lord
  let startIdx = DASHA_ORDER.indexOf(nakLord);
  let order = [...DASHA_ORDER.slice(startIdx), ...DASHA_ORDER.slice(0, startIdx)];

  // How far into the Nakshatra is the planet?
  let degInNak = abs - (nakIndex * nakSize);
  let currentDeg = 0;

  for(let i = 0; i < 9; i++){
    let subLord = order[i];
    // Length of this sub = (dasha_years / 120) * 13.333333
    let subSize = (DASHA_YEARS[subLord] / 120) * nakSize;
    currentDeg += subSize;
    
    // Float math margin of error protection
    if(degInNak <= currentDeg + 0.000001){
      return subLord;
    }
  }
  return "";
}

/* ======================================
   HELPER: STRICT CUSP HOUSE LOCATOR
   Calculates which house a planet is in strictly using True/Equal Cusps
====================================== */
function getBaseCuspHouse(entAbs) {
    if(entAbs === null) return 1;
    
    let cusps = [];
    for(let i=1; i<=12; i++) {
        let cAbs = getCuspAbsolute(i); 
        if(cAbs !== null) cusps.push({ house: i, abs: ((cAbs % 360) + 360) % 360 });
    }
    
    // FIXED: Removed the bypass so Equal Mode strictly respects the boundaries!
    if (cusps.length === 12) {
        cusps.sort((a,b) => a.abs - b.abs);
        
        for(let i=0; i<12; i++) {
            let c1 = cusps[i].abs;
            let c2 = cusps[(i+1)%12].abs;
            let h = cusps[i].house;
            const eps = 0.000001; // Tiny buffer for floating-point errors
            if(c1 < c2) {
                if(entAbs >= (c1 - eps) && entAbs < (c2 - eps)) return h;
            } else {
                if(entAbs >= (c1 - eps) || entAbs < (c2 - eps)) return h;
            }
        }
        return 1;
    } else {
        // Equal House / Fallback math anchored to Pivot
        let pivot = document.getElementById("kundaliPivot")?.value || "Lagna";
        let pivotAbs = getAbsDeg(pivot);
        if(pivotAbs === null) return 1;
        
        let pivotDeg = pivotAbs % 30;
        let isOrig = document.getElementById("originalASC")?.checked;
        
        let shift = (!isOrig && pivotDeg >= 15) ? 30 : 0;
        let p = (pivotAbs + shift + 360) % 360;
        
        let diff = entAbs - p;
        if(diff < 0) diff += 360;
        let h = Math.floor(diff / 30) + 1;
        return h > 12 ? h - 12 : h;
    }
}

















/* ======================================
   DYNAMIC PLANET HOUSE LOGIC 
====================================== */


function getPlanetHouse(entity){
  let pivot = document.getElementById("kundaliPivot").value;
  let pivotAbs = getAbsDeg(pivot);
  let entAbs = getAbsDeg(entity);
  if(pivotAbs === null || entAbs === null) return "";

  /* MODE 1 : SIGN-TO-SIGN */
  if(document.getElementById("sign2signMode")?.checked){
    let pSign = Math.floor((pivotAbs + 0.000001) / 30);
    let eSign = Math.floor((entAbs + 0.000001) / 30);
    let house = eSign - pSign + 1;
    if(house <= 0) house += 12;
    return house;
  }

  /* MODE 2 : KP MODE */
  if(document.getElementById("kpMode")?.checked){
      let pivotBaseHouse = 1;
      if (pivot.includes("CSL")) {
          pivotBaseHouse = parseInt(pivot, 10);
      } else if (pivot === "Lagna") {
          pivotBaseHouse = 1;
      } else {
          pivotBaseHouse = getBaseCuspHouse(pivotAbs);
      }
      
      let entBaseHouse = getBaseCuspHouse(entAbs);
      let house = entBaseHouse - pivotBaseHouse + 1;
      if(house <= 0) house += 12;
      return house;
  }

  /* MODE 3 : VEDIC MODE */
  if(document.getElementById("vedicMode")?.checked){
    let bhavaStart = pivotAbs - 15;
    bhavaStart = ((bhavaStart % 360) + 360) % 360;
    let diff = entAbs - bhavaStart;
    diff = ((diff % 360) + 360) % 360;
    // Floating point safety added here
    let house = Math.floor((diff + 0.000001) / 30) + 1;
    if(house > 12) house -= 12;
    return house;
  }

  return 1;
}













/* ======================================
   GLOBAL OFFSET
   (Forces UI to ALWAYS snap pivot planet to 0° in KP mode)
====================================== */



function getGlobalOffset(){
  if(!document.getElementById("kpMode")?.checked && !document.getElementById("vedicMode")?.checked) return 0;

  let pivot = document.getElementById("kundaliPivot").value;
  let abs = getAbsDeg(pivot);
  if(abs == null) return 0;
  
  let pivotDeg = abs % 30;

  if(document.getElementById("kpMode")?.checked){
    if(pivot.includes("CSL")){
      return 0;
    }

    let isOrig = document.getElementById("originalASC")?.checked;

    // FIXED: Removed the Equal Mode bypass. 
    // Now it correctly jumps forward to the next sign if Original ASC is OFF and the planet is >= 15°.
    if(!isOrig && pivotDeg >= 15){
      return 30 - pivotDeg;   
    }

    return -pivotDeg;
  }

  if(document.getElementById("vedicMode")?.checked){
    return 15 - pivotDeg;
  }

  return 0;
}

/* ======================================
   KUNDALI RENDERER (BHAVA CHALIT OVERRIDE)
====================================== */
function drawSIKundali(){

  initSIKundali();
  let hasData = !!window.__lastSwissData;

  let pivot=document.getElementById("kundaliPivot").value;
  let pivotAbs=getShiftedDeg(pivot);
  if(pivotAbs==null) return;

  let offset=getGlobalOffset();
  
  // THE FIX: Adding +0.000001 prevents the 29.99999° bug from pushing Lagna backward into the previous sign.
  let baseSignIndex = Math.floor((pivotAbs + 0.000001) / 30) % 12;

  let cells=[...document.querySelectorAll("#siKundali .siCell[data-sign]")];
  let allCells = document.querySelectorAll("#siKundali .siCell");
  
  allCells.forEach(cell => {
    let sign = cell.dataset.sign;
    if(!sign) return; 
    
    let signIndex = ZODIAC_ORDER.indexOf(sign);
    let houseNum = ((signIndex - baseSignIndex + 12) % 12) + 1;
    
    cell.querySelector(".siHouse").textContent = houseNum;
    cell.querySelector(".siSign").textContent = "";
    cell.querySelector(".siList").innerHTML = ""; 
  });

  let buckets={};
  let isKP = document.getElementById("kpMode")?.checked;
  
  if(document.getElementById("showCusps")?.checked){
    const data = window.__lastSwissData;
    if(data && (data.cusps || document.getElementById("equalMode")?.checked)){
      for(let i=0;i<12;i++){
        let cuspNum = i + 1;
        let cuspAbs = getCuspAbsolute(cuspNum);
        if(typeof cuspAbs !== "number") continue;

        let shifted = (cuspAbs + offset + 360) % 360;
        let signIndex;
        
        // Force Cusps to perfectly align with Houses in KP Mode
        if(isKP && pivot === "Lagna"){ 
            signIndex = (baseSignIndex + i) % 12;
        } else {
            // Epsilon safety added
            signIndex = Math.floor((shifted + 0.000001) / 30) % 12;
        }
        
        let sign = signs[signIndex+1];
        if(!buckets[sign]) buckets[sign]=[];

        // Epsilon safety for visual minutes/degrees rendering
        let d = shifted % 30;
        let deg = Math.floor(d + 0.000001);
        let min = Math.floor(((d + 0.000001) - deg) * 60);

        buckets[sign].push({
          label:`C${cuspNum}`,
          text:`C${cuspNum} :: ${String(deg).padStart(2,"0")}°${String(min).padStart(2,"0")}′`,
          type:"cusp",
          deg,
          signIndex
        });
      }
    }
  }

  planets.filter(p=>!p.includes("CSL")).forEach(p=>{
    let abs=getAbsDeg(p);
    if(abs==null) return;

    let shifted=(abs+offset+360)%360;
    let d = shifted % 30;
    
    // Epsilon safety for visual minutes/degrees rendering
    let deg = Math.floor(d + 0.000001);
    let min = Math.floor(((d + 0.000001) - deg) * 60);

    let signIndex;
    
    // THE MAGIC: Force Visual UI to match the exact mathematical House!
    if(isKP){
        let h = parseInt(getPlanetHouse(p));
        if(isNaN(h)) h = 1;
        signIndex = (baseSignIndex + h - 1) % 12;
    } else {
        // Epsilon safety added
        signIndex = Math.floor((shifted + 0.000001) / 30) % 12;
    }
    
    let sign=signs[signIndex+1];
    if(!buckets[sign]) buckets[sign]=[];

    buckets[sign].push({
      label:p,
      deg,
      min
    });
  });

  Object.keys(buckets).forEach(sign=>{
    let cell=cells.find(c=>c.dataset.sign===sign);
    if(!cell) return;
    let signIndex=ZODIAC_ORDER.indexOf(sign);

    function degValue(p){
      return (p.deg || 0) + ((p.min || 0)/60);
    }

    if(signIndex<=5){
      buckets[sign].sort((a,b)=>degValue(a)-degValue(b));
    }else{
      buckets[sign].sort((a,b)=>degValue(b)-degValue(a));
    }

    buckets[sign].forEach(p=>{
      let d=document.createElement("div");

      if(p.type==="cusp"){
        d.textContent = p.text;
        d.style.color="#10b981";
        d.style.fontWeight="900";
      }else{
        let minText = (p.min!==undefined) ? String(p.min).padStart(2,"0")+"′" : "";
        d.textContent=`${p.label} ${p.deg}°${minText}`;
        d.style.fontWeight="900";

        let pivotSelect=document.getElementById("kundaliPivot").value;
        if(p.label===pivotSelect || (pivotSelect.includes("CSL") && p.label==="C"+parseInt(pivotSelect))){
          d.style.color="#ffff00";
          d.style.fontSize="15px";
        }
      }
      cell.querySelector(".siList").appendChild(d);
    });
  });
}

/* ======================================

====================================== */

function getDBAOrderFromMoon(){

  if(!window.__lastSwissData) return [];

  const moonAbs = getAbsDeg("Chandra");
  if(moonAbs == null) return [];

  const nakSize = 360/27;
  const nakIndex = Math.floor(moonAbs / nakSize);

  const starLord = NAKSHATRA_LORDS[nakIndex];

  const baseOrder = [
    "Ketu","Venus","Surya","Chandra",
    "Mangala","Rahu","Jupiter","Saturn","Budha"
  ];

  const startIndex = baseOrder.indexOf(starLord);

  return [
    ...baseOrder.slice(startIndex),
    ...baseOrder.slice(0,startIndex)
  ];
}





function getPlanetHouseAbsolute(entity){

  let abs = getAbsDeg(entity);
  if(abs == null) return "";

  const data = window.__lastSwissData;
  if(!data || (!data.cusps && !document.getElementById("equalMode")?.checked)) return "";

 for(let i = 1; i <= 12; i++){
        let current = getCuspAbsolute(i);
        let next = getCuspAbsolute(i === 12 ? 1 : i + 1);
        const eps = 0.000001; // Tiny buffer for floating-point errors

        if(current < next){
          if(abs >= (current - eps) && abs < (next - eps)) return i;
        } else {
          if(abs >= (current - eps) || abs < (next - eps)) return i;
        }
      }

  return "";
}







function rotateHouseList(list){

  if(!list.length) return [];

  let pivot = document.getElementById("kundaliPivot").value;

  // 🔥 FORCE correct house calculation (same as UI)
  let pivotHouse = getPlanetHouseAbsolute(pivot);

  if(!pivotHouse) return list;

  pivotHouse = parseInt(pivotHouse);

  let rotated = list.map(h => ((h - pivotHouse + 12) % 12) + 1);

  // 🔥 SORT after rotation (IMPORTANT)
  return rotated.sort((a,b)=>a-b);
}

  // NEW: Mathematical logic to calculate Sub-Sub Lord
  function getSubSubLord(entity){
    let abs = getAbsDeg(entity);
    if(abs === null) return "";

    let nakSize = 360 / 27; 
    let nakIndex = Math.floor(abs / nakSize);
    let nakLord = NAKSHATRA_LORDS[nakIndex];

    let startIdx = DASHA_ORDER.indexOf(nakLord);
    let order = [...DASHA_ORDER.slice(startIdx), ...DASHA_ORDER.slice(0, startIdx)];

    let degInNak = abs - (nakIndex * nakSize);
    let currentDeg = 0;

    for(let i = 0; i < 9; i++){
      let subLord = order[i];
      let subSize = (DASHA_YEARS[subLord] / 120) * nakSize;
      
      if(degInNak <= currentDeg + subSize + 0.000001){
         // We are inside the Sub Lord, now calculate the Sub-Sub
         let subStartIdx = DASHA_ORDER.indexOf(subLord);
         let ssOrder = [...DASHA_ORDER.slice(subStartIdx), ...DASHA_ORDER.slice(0, subStartIdx)];
         
         let degInSub = degInNak - currentDeg;
         let ssCurrentDeg = 0;
         for(let j = 0; j < 9; j++){
            let ssLord = ssOrder[j];
            let ssSize = (DASHA_YEARS[ssLord] / 120) * subSize;
            if(degInSub <= ssCurrentDeg + ssSize + 0.000001) {
               return ssLord;
            }
            ssCurrentDeg += ssSize;
         }
         return subLord; // fallback
      }
      currentDeg += subSize;
    }
    return "";
  }

function getCurrentMahadasha(basePlanet) {
  if (!window.__lastSwissData) return "Ketu";
  const MS_YEAR = 365.25 * 24 * 60 * 60 * 1000;
  const nakSize = 360 / 27;
  let baseAbs = getAbsDeg(basePlanet);
  if (baseAbs == null) return "Ketu";
  let nakIndex = Math.floor(baseAbs / nakSize);
  let startLord = NAKSHATRA_LORDS[nakIndex];
  let frac = (baseAbs % nakSize) / nakSize;
  let elapsedYears = DASHA_YEARS[startLord] * frac;

  const data = window.__lastSwissData;
  let birthDate = new Date(data.meta.datetime_utc);

  let mahaStart = new Date(
    birthDate.getTime()
    - elapsedYears * MS_YEAR
    + (VIM_CALIB_OFFSET_DAYS * 24 * 60 * 60 * 1000)
  );

  let startIndex = DASHA_ORDER.indexOf(startLord);
  let order = [...DASHA_ORDER.slice(startIndex), ...DASHA_ORDER.slice(0, startIndex)];

  let inp = document.getElementById("vimEventDate");
  let checkDate = inp && inp.value ? new Date(inp.value) : new Date();

  for (let mahaLord of order) {

function getCurrentBhukti(basePlanet) {
  if (!window.__lastSwissData) return "Venus";
  const MS_YEAR = 365.25 * 24 * 60 * 60 * 1000;
  const nakSize = 360 / 27;
  let baseAbs = getAbsDeg(basePlanet);
  if (baseAbs == null) return "Venus";
  let nakIndex = Math.floor(baseAbs / nakSize);
  let startLord = NAKSHATRA_LORDS[nakIndex];
  let frac = (baseAbs % nakSize) / nakSize;
  let elapsedYears = DASHA_YEARS[startLord] * frac;

  const data = window.__lastSwissData;
  let birthDate = new Date(data.meta.datetime_utc);

  let mahaStart = new Date(
    birthDate.getTime()
    - elapsedYears * MS_YEAR
    + (VIM_CALIB_OFFSET_DAYS * 24 * 60 * 60 * 1000)
  );

  let startIndex = DASHA_ORDER.indexOf(startLord);
  let order = [...DASHA_ORDER.slice(startIndex), ...DASHA_ORDER.slice(0, startIndex)];

  let inp = document.getElementById("vimEventDate");
  let checkDate = inp && inp.value ? new Date(inp.value) : new Date();

  for (let mahaLord of order) {
    let mahaYears = DASHA_YEARS[mahaLord];
    let mahaEnd = new Date(mahaStart.getTime() + mahaYears * MS_YEAR);
    if (checkDate >= mahaStart && checkDate < mahaEnd) {
      let bhuktiIndex = DASHA_ORDER.indexOf(mahaLord);
      let bhuktiOrder = [...DASHA_ORDER.slice(bhuktiIndex), ...DASHA_ORDER.slice(0, bhuktiIndex)];
      let bhuktiStart = new Date(mahaStart);
      for (let bhuktiLord of bhuktiOrder) {
         let bhuktiYears = mahaYears * (DASHA_YEARS[bhuktiLord] / 120);
         let bhuktiEnd = new Date(bhuktiStart.getTime() + bhuktiYears * MS_YEAR);
         if (checkDate >= bhuktiStart && checkDate < bhuktiEnd) {
             return bhuktiLord;
         }
         bhuktiStart = bhuktiEnd;
      }
    }
    mahaStart = mahaEnd;
  }
  return order[0];
}

function getPlanetSignificatorsSplit(planet, forceUntenanted = false, forceStarlordOnly = false){

  let s_lords = starLord ? getLordsOf(starLord) : "";

  let blocks=[];

    // Rahu/Ketu → only show house
    if(planet==="Rahu" || planet==="Ketu"){
      blocks.push(`${p_house}`);

        p_lords.split(",").forEach(n=>{
          nums.push(parseInt(n));

      // remove duplicates and sort
      nums = [...new Set(nums)].sort((a,b)=>a-b);

      blocks.push(`${p_house}-${nums.join(",")}`);
    }
  }
  
  
  
  
  
  
  
  
  
  

  /* STAR LORD BLOCK */

  if(s_house){

    // remove duplicates and sort

    if(nums.length===1){

      planets.forEach(x=>{
        x.replace(/[()]/g,"")
         .split(",")
         .forEach(n=>allNums.push(parseInt(n)));
      });
    });

    allNums = allNums.filter(n=>!isNaN(n));
    allNums = [...new Set(allNums)].sort((a,b)=>a-b);

    if(allNums.length){
      blocks.push(`${allNums.join(",")}`);
    }
  }








  /* Aspects (planet + star lord combined) */
  if(document.getElementById("useAspects")?.checked){

    let allNums=[];

    [forceStarlordOnly ? null : planet, starLord].forEach(ent=>{
      if(!ent) return;

      let asp=getAspectHouses(ent);
      if(asp && asp!=="-"){
        asp.split(",").forEach(n=>allNums.push(parseInt(n)));
      }
    });

    allNums = allNums.filter(n=>!isNaN(n));
    allNums = [...new Set(allNums)].sort((a,b)=>a-b);

    if(allNums.length){
      blocks.push(`${allNums.join(",")}`);
    }
  }















  /* Cuspal conjunction (planet + star lord combined) */
if(document.getElementById("useConjCusps")?.checked){

  let allNums=[];
  const allowRaKe = document.getElementById("includeRaKeCuspal")?.checked;

  [forceStarlordOnly ? null : planet, starLord].forEach(ent=>{
    if(!ent) return;

    if(!allowRaKe && (ent==="Rahu" || ent==="Ketu")) return;

    let cus=getCuspalConjunct(ent);
    if(cus && cus!=="-"){
      cus.split(",").forEach(n=>allNums.push(parseInt(n)));
    }
  });

  allNums = allNums.filter(n=>!isNaN(n));
  allNums = [...new Set(allNums)].sort((a,b)=>a-b);

  if(allNums.length){
    blocks.push(`${allNums.join(",")}`);
  }
}

  
  

  return blocks.join(" + ") || "-";
}

    });

/* Cuspal conjunction */

}












function getYoginiSignificators(lord){

  // Sankata special rule
  if(lord==="Rahu"){
    let r = getPlanetSignificators("Rahu");
    let k = getPlanetSignificators("Ketu");

    if(r==="-" && k==="-" ) return "-";
    if(r==="-" ) return k;
    if(k==="-" ) return r;

    return r + " + " + k;
  }

  return getPlanetSignificators(lord);
}

function formatDashaLine(level, lord, sig, start, end){

  let startTxt=formatDateSmart(start);
  let endTxt=formatDateSmart(end);

  /* AGE DISPLAY */
 const showAge = document.getElementById("showAgeYears")?.checked;
const hideBhukti = document.getElementById("hideBhuktiAge")?.checked;

if(
  showAge &&
  VIM_BIRTH_DATE &&
  (
    level==="Mahadasha" ||
    (level==="Bhukti" && !hideBhukti)
  )
){




  const MS_YEAR = 365.25*24*60*60*1000;

 return {

  if(untenanted.includes(lord)){
    return base+" $";
  }
  return base;
})(),
  sig:sig,
  start:startTxt,
  end:endTxt
};
}













function formatDateSmart(d){

  const hideDay=document.getElementById("hideVimDates")?.checked;
  const useMonth=document.getElementById("useMonthNames")?.checked;

  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const MONTHS_KN=[
    "ಜನವರಿ","ಫೆಬ್ರವರಿ","ಮಾರ್ಚ್","ಏಪ್ರಿಲ್","ಮೇ","ಜೂನ್",
    "ಜುಲೈ","ಆಗಸ್ಟ್","ಸೆಪ್ಟೆಂಬರ್","ಅಕ್ಟೋಬರ್","ನವೆಂಬರ್","ಡಿಸೆಂಬರ್"
  ];

  let year=d.getFullYear();

  let month=useMonth
    ? (USE_KN_VIM
        ? MONTHS_KN[d.getMonth()]
        : MONTHS[d.getMonth()])
    : String(d.getMonth()+1).padStart(2,"0");

  if(hideDay){
    return year+"-"+month;
  }

  let day=String(d.getDate()).padStart(2,"0");
  return year+"-"+month+"-"+day;
}





function formatDate(d){
  return d.getFullYear()+"-"+
    String(d.getMonth()+1).padStart(2,"0")+"-"+
    String(d.getDate()).padStart(2,"0");
}

function renderDashaDividerTable() {
  const wrap = document.getElementById("dashaDividerTableWrap");
  const controls = document.getElementById("dashaDividerControls");
  
  if(!wrap || !controls) return;
  
  // Collapse completely if the parent mixer section is collapsed
  if (window.__dbaMixerExpanded === false) {
      controls.style.display = "none";
      wrap.style.display = "none";
      return;
  } else {
      wrap.style.display = "block"; // Reset
  }

  if(!window.__lastMixedData || window.__lastMixedData.length === 0) {
    controls.style.display = "none";
    wrap.innerHTML = "";
    return;
  }

  controls.style.display = "flex";

  const rawPos = document.getElementById("dividerPos").value;
  const rawSupport = document.getElementById("dividerSupport").value;
  const rawNeg = document.getElementById("dividerNeg").value;

  const numsPos = rawPos.split(",").map(x=>+x.trim()).filter(x=>x>=1 && x<=12);
  const numsSupport = rawSupport.split(",").map(x=>+x.trim()).filter(x=>x>=1 && x<=12);
  const numsNeg = rawNeg.split(",").map(x=>+x.trim()).filter(x=>x>=1 && x<=12);

  // 1. SPLIT THE DATA INTO TWO GROUPS
  const dbData = window.__lastMixedData.filter(r => !r.planetName.includes("(B-A)"));
  const baData = window.__lastMixedData.filter(r => r.planetName.includes("(B-A)"));

  wrap.innerHTML = "";

  // 2. HELPER TO CREATE AN "ISLAND" TABLE
  function createIslandTable(dataArray, titleText) {
    const wrapper = document.createElement("div");
    wrapper.style.marginBottom = "50px"; // Creates the clean gap between tables

    const title = document.createElement("div");
    title.innerHTML = titleText;
    title.style.textAlign = "center";
    title.style.color = "#d4af37";
    title.style.fontWeight = "900";
    title.style.fontSize = "22px";
    title.style.marginBottom = "10px";
    wrapper.appendChild(title);

    const table = document.createElement("table");
    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    
    table.innerHTML = `
      <tr>
        <th style="border:1px solid #10b981; padding:8px; font-weight:900;">Planets</th>
        <th style="border:1px solid #10b981; padding:8px; font-weight:900;">Mixed</th>
        <th style="border:1px solid #10b981; padding:8px; font-weight:900; color:#10b981;">NUMBER POS</th>
        <th style="border:1px solid #10b981; padding:8px; font-weight:900; color:#d4af37;">NUMBER SUPPORT</th>
        <th style="border:1px solid #10b981; padding:8px; font-weight:900; color:#ef4444;">NUMBER NEG</th>
      </tr>
    `;

    dataArray.forEach(row => {
      let matchPos = numsPos.filter(n => row.nums.includes(n)).sort((a,b)=>a-b);
      let matchSupport = numsSupport.filter(n => row.nums.includes(n)).sort((a,b)=>a-b);
      let matchNeg = numsNeg.filter(n => row.nums.includes(n)).sort((a,b)=>a-b);

      let tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="border:1px solid #10b981; padding:8px; text-align:center; font-weight:500;">${row.planetName}</td>
        <td style="border:1px solid #10b981; padding:8px; text-align:center; font-weight:500;">${row.mixedHtml}</td>
        <td style="border:1px solid #10b981; padding:8px; text-align:center; font-weight:900; color:#10b981;">${matchPos.join(", ")}</td>
        <td style="border:1px solid #10b981; padding:8px; text-align:center; font-weight:900; color:#d4af37;">${matchSupport.join(", ")}</td>
        <td style="border:1px solid #10b981; padding:8px; text-align:center; font-weight:900; color:#ef4444;">${matchNeg.join(", ")}</td>
      `;
      table.appendChild(tr);
    });

    wrapper.appendChild(table);
    return wrapper;
  }

  // 3. APPEND BOTH ISLANDS
  if (dbData.length > 0) {
    wrap.appendChild(createIslandTable(dbData, "Dasha & Bukthi (D-B) View"));
  }

  if (baData.length > 0) {
    wrap.appendChild(createIslandTable(baData, "Bukthi & Antara (B-A) View"));
  }
}

function buildSplitBlock(ent) {
    if(!ent) return "";
    let h = getPlanetHouse(ent);
    let nums = [];
    
    let l = (ent === "Rahu" || ent === "Ketu") ? "" : getLordsOf(ent);
    if(l && l !== "-") {
        l.split(",").forEach(x => nums.push(parseInt(x)));
    }

    // --- NEW: INJECT DISPOSITOR (SPLIT VIEW) ---
    if (window.__dba3AddDispositor && (ent === "Rahu" || ent === "Ketu")) {
        let sign = getPlanetSign(ent);
        let disp = SIGN_LORDS[sign];
        if (disp) {
            let dHouse = getPlanetHouse(disp);
            if (dHouse) nums.push(parseInt(dHouse));
            let dLords = getLordsOf(disp);
            if (dLords && dLords !== "-") {
                dLords.split(",").forEach(x => nums.push(parseInt(x)));
            }
        }
    }

    // Cuspal conjunction support
    if(document.getElementById("useConjCusps")?.checked) {
        let allowRaKe = document.getElementById("includeRaKeCuspal")?.checked;
        if(allowRaKe || (ent !== "Rahu" && ent !== "Ketu")) {
            let c = getCuspalConjunct(ent);
            if(c && c !== "-") c.split(",").forEach(x => nums.push(parseInt(x)));
        }
    }

    // Deduplicate and sort only the lordships/cusps
    nums = [...new Set(nums.filter(x => !isNaN(x)))].sort((a,b) => a - b);
    
    // Format perfectly as House-Lords without deleting the house duplicate
    if(!h) return nums.join(",") || "-";
    if(nums.length === 0) return `${h}`;
    return `${h}-${nums.join(",")}`;
}

// UPDATED: Main extraction logic to handle both views (with duplicates allowed in Normal View)
function getMixer3Nums(p, showP, showS) {
    if (window.__dba3SplitView) {
        let pBlock = "";
        let sBlock = "";

        if (showP) {
            pBlock = buildSplitBlock(p);
        }
        if (showS) {
            let sl = getStarLord(p);
            if (sl) sBlock = buildSplitBlock(sl);
        }

        if (pBlock && sBlock) return `${pBlock} + ${sBlock}`;
        if (pBlock) return pBlock;
        if (sBlock) return sBlock;
        return "-";
    } else {
        // NORMAL VIEW LOGIC (Duplicates Allowed)
        let nums = [];
        if(showP) {
            let h = getPlanetHouse(p);
            if(h) nums.push(parseInt(h));
            let l = (p === "Rahu" || p === "Ketu") ? "" : getLordsOf(p);
            if(l && l!=="-") l.split(",").forEach(x=>nums.push(parseInt(x)));

            // --- NEW: INJECT DISPOSITOR (NORMAL VIEW) ---
            if (window.__dba3AddDispositor && (p === "Rahu" || p === "Ketu")) {
                let sign = getPlanetSign(p);
                let disp = SIGN_LORDS[sign];
                if (disp) {
                    let dHouse = getPlanetHouse(disp);
                    if (dHouse) nums.push(parseInt(dHouse));
                    let dLords = getLordsOf(disp);
                    if (dLords && dLords !== "-") {
                        dLords.split(",").forEach(x => nums.push(parseInt(x)));
                    }
                }
            }
        }
        if(showS) {
            let sl = getStarLord(p);
            if(sl) {
                let h = getPlanetHouse(sl);
                if(h) nums.push(parseInt(h));
                let l = (sl === "Rahu" || sl === "Ketu") ? "" : getLordsOf(sl);
                if(l && l!=="-") l.split(",").forEach(x=>nums.push(parseInt(x)));

                // --- NEW: INJECT DISPOSITOR (NORMAL VIEW) ---
                if (window.__dba3AddDispositor && (sl === "Rahu" || sl === "Ketu")) {
                    let sign = getPlanetSign(sl);
                    let disp = SIGN_LORDS[sign];
                    if (disp) {
                        let dHouse = getPlanetHouse(disp);
                        if (dHouse) nums.push(parseInt(dHouse));
                        let dLords = getLordsOf(disp);
                        if (dLords && dLords !== "-") {
                            dLords.split(",").forEach(x => nums.push(parseInt(x)));
                        }
                    }
                }
            }
        }
        if(document.getElementById("useConjCusps")?.checked) {
            let allowRaKe = document.getElementById("includeRaKeCuspal")?.checked;
            if(showP && (allowRaKe || (p!=="Rahu" && p!=="Ketu"))) {
                let c = getCuspalConjunct(p);
                if(c && c!=="-") c.split(",").forEach(x=>nums.push(parseInt(x)));
            }
            if(showS) {
                let sl = getStarLord(p);
                if(sl && (allowRaKe || (sl!=="Rahu" && sl!=="Ketu"))) {
                    let c = getCuspalConjunct(sl);
                    if(c && c!=="-") c.split(",").forEach(x=>nums.push(parseInt(x)));
                }
            }
        }
        // Retain duplicates for Normal View
        return nums.filter(x=>!isNaN(x)).sort((a,b)=>a-b).join(",") || "-";
    }
}








function buildDashaBukthiAntaraMixer() {
    if (typeof window.__dba3Expanded === 'undefined') {
        window.__dba3Expanded = false; // Collapsed by default
    }

    let wrap = document.getElementById("dba3MixerWrap");
    if(!wrap) {
        wrap = document.createElement("div");
        wrap.id = "dba3MixerWrap";
        wrap.style.marginTop = "50px";
        wrap.style.marginBottom = "50px";
        wrap.style.width = "100%";
        wrap.style.maxWidth = "1400px";
        wrap.style.marginLeft = "auto";
        wrap.style.marginRight = "auto";
        
        let target = document.getElementById("dashaDividerTableWrap");
        if(target) target.insertAdjacentElement("afterend", wrap);
        else document.body.appendChild(wrap);
    }
    wrap.innerHTML = "";
    if(!window.__lastSwissData) return;

    // TITLE (Collapsible Trigger)
    const title = document.createElement("h2");
    title.innerHTML = "DASHA BUKTHI ANTARA MIXER <span style='font-size:18px;'>▼</span>";
    title.style.margin = "0 0 20px 0";
    title.style.fontSize = "26px";
    title.style.fontWeight = "500";
    title.style.textAlign = "left"; // Forces left alignment, overriding global CSS
    title.style.background = "linear-gradient(90deg,#10b981,#38bdf8)";
    title.style.webkitBackgroundClip = "text";
    title.style.webkitTextFillColor = "transparent";
    title.style.cursor = "pointer";
    wrap.appendChild(title);

    // INNER CONTAINER (For expanding/collapsing)
    const innerWrap = document.createElement("div");
    innerWrap.style.display = window.__dba3Expanded ? "block" : "none";
    innerWrap.style.width = "100%";
    wrap.appendChild(innerWrap);

    title.onclick = () => {
        window.__dba3Expanded = !window.__dba3Expanded;
        innerWrap.style.display = window.__dba3Expanded ? "block" : "none";
    };

    // START TABS FROM BIRTH STARLORD OF MOON
    let birthStarlord = getStarLord("Chandra") || "Ketu";
    let startIndex = DASHA_ORDER.indexOf(birthStarlord);
    let order = [...DASHA_ORDER.slice(startIndex), ...DASHA_ORDER.slice(0, startIndex)];
    
    // SELECT THE CURRENT RUNNING MAHADASHA BY DEFAULT
    let currentMaha = getCurrentMahadasha("Chandra");

    if(!window.__dba3Dasha || !DASHA_ORDER.includes(window.__dba3Dasha)) {
        window.__dba3Dasha = currentMaha;
        // Dynamic Untenanted behavior on load for the selected planet
        if (getUntenantedPlanets().includes(window.__dba3Dasha)) {
            window.__dba3DashaP = true;
            window.__dba3DashaS = false;
        } else {
            window.__dba3DashaP = true;
            window.__dba3DashaS = true;
        }
    }

    // TABS (9 Planets)
    let tabsDiv = document.createElement("div");
    tabsDiv.style = "display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:20px;";
    order.forEach(p => {
        let btn = document.createElement("button");
        btn.innerHTML = getPlanetLabel(p); // No brackets
        btn.style.background = (p === window.__dba3Dasha) ? "linear-gradient(135deg,#10b981,#d4af37)" : "#010a08";
        btn.style.color = (p === window.__dba3Dasha) ? "#021b16" : "#10b981";
        btn.style.border = "1px solid #10b981";
        btn.style.padding = "6px 16px";
        btn.style.cursor = "pointer";
        btn.style.fontWeight = "900";
        
        btn.onclick = () => {
            window.__dba3Dasha = p;
            // Dynamic Untenanted behavior: Check Planet, Uncheck Starlord, but leave fully clickable
            if (getUntenantedPlanets().includes(p)) {
                window.__dba3DashaP = true;
                window.__dba3DashaS = false; 
            } else {
                window.__dba3DashaP = true;
                window.__dba3DashaS = true;
            }
            buildDashaBukthiAntaraMixer();
        };
        tabsDiv.appendChild(btn);
    });
    innerWrap.appendChild(tabsDiv);

    // ==========================================
    // NEW: VIEW TOGGLES (Normal vs Split View)
    // ==========================================
    let viewToggleWrap = document.createElement("div");
    viewToggleWrap.style = "display:flex; justify-content:center; gap:30px; margin-bottom:25px;";

    let normalLabel = document.createElement("label");
    normalLabel.style = "font-weight:900; color:#d4af37; cursor:pointer; font-size:18px;";
    let normalCb = document.createElement("input");
    normalCb.type = "checkbox";
    normalCb.checked = window.__dba3NormalView;

    let splitLabel = document.createElement("label");
    splitLabel.style = "font-weight:900; color:#d4af37; cursor:pointer; font-size:18px;";
    let splitCb = document.createElement("input");
    splitCb.type = "checkbox";
    splitCb.checked = window.__dba3SplitView;

    // Mutual exclusivity logic
    normalCb.onchange = (e) => {
        if (e.target.checked) {
            window.__dba3NormalView = true;
            window.__dba3SplitView = false;
        } else {
            window.__dba3NormalView = false;
            window.__dba3SplitView = true; // Fallback to ensure one is always active
        }
        buildDashaBukthiAntaraMixer();
    };

    splitCb.onchange = (e) => {
        if (e.target.checked) {
            window.__dba3SplitView = true;
            window.__dba3NormalView = false;
        } else {
            window.__dba3SplitView = false;
            window.__dba3NormalView = true;
        }
        buildDashaBukthiAntaraMixer();
    };

    normalLabel.appendChild(normalCb);
    normalLabel.appendChild(document.createTextNode(" Normal View"));

    splitLabel.appendChild(splitCb);
    splitLabel.appendChild(document.createTextNode(" Split View"));

    // --- NEW: ADD DISPOSITOR CHECKBOX ---
    if (typeof window.__dba3AddDispositor === 'undefined') window.__dba3AddDispositor = false;

    let dispLabel = document.createElement("label");
    dispLabel.style = "font-weight:900; color:#d4af37; cursor:pointer; font-size:18px; margin-left:15px;";
    let dispCb = document.createElement("input");
    dispCb.type = "checkbox";
    dispCb.checked = window.__dba3AddDispositor;

    dispCb.onchange = (e) => {
        window.__dba3AddDispositor = e.target.checked;
        buildDashaBukthiAntaraMixer();
    };

    dispLabel.appendChild(dispCb);
    dispLabel.appendChild(document.createTextNode(" Add Dispositor"));

    viewToggleWrap.appendChild(normalLabel);
    viewToggleWrap.appendChild(splitLabel);
    viewToggleWrap.appendChild(dispLabel); // Append new toggle
    innerWrap.appendChild(viewToggleWrap);
    // ==========================================

    // CHECKBOXES (6 Total - Fully Unlocked)
    let cbDiv = document.createElement("div");
    cbDiv.style = "display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; text-align:center; margin-bottom:50px;"; // Changed 20px to 50px for the top gap













    function createCbCol(titleStr, pVar, sVar) {
        let col = document.createElement("div");
        col.style = "border:1px solid #10b981; padding:10px; background:linear-gradient(180deg,#021b16,#010a08);";
        let h3 = document.createElement("h3");
        h3.style = "margin:0 0 10px 0; color:#d4af37; font-size:18px;";
        h3.textContent = titleStr;

        let pLabel = document.createElement("label");
        pLabel.style = "margin-right:15px; font-weight:900; color:#ecfdf5; cursor:pointer;";
        let pInput = document.createElement("input");
        pInput.type = "checkbox";
        pInput.checked = window[pVar];

        let sLabel = document.createElement("label");
        sLabel.style = "font-weight:900; color:#ecfdf5; cursor:pointer;";
        let sInput = document.createElement("input");
        sInput.type = "checkbox";
        sInput.checked = window[sVar];

        pInput.onchange = (e) => { window[pVar] = e.target.checked; buildDashaBukthiAntaraMixer(); };
        sInput.onchange = (e) => { window[sVar] = e.target.checked; buildDashaBukthiAntaraMixer(); };

        pLabel.appendChild(pInput); pLabel.appendChild(document.createTextNode(" Planet"));
        sLabel.appendChild(sInput); sLabel.appendChild(document.createTextNode(" Starlord"));

        col.appendChild(h3);
        col.appendChild(pLabel);
        col.appendChild(sLabel);
        return col;
    }
	
	
	
	
	
	
	
	
	

    cbDiv.appendChild(createCbCol("Dasha", "__dba3DashaP", "__dba3DashaS"));
    cbDiv.appendChild(createCbCol("Bukthi", "__dba3BukthiP", "__dba3BukthiS"));
    cbDiv.appendChild(createCbCol("Antara", "__dba3AntaraP", "__dba3AntaraS"));
    innerWrap.appendChild(cbDiv);

    // 81-ROW TABLE WITH 9 ISLANDS
    const table = document.createElement("table");
    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.background = "transparent"; // Made transparent to show gaps
    
	
	
	
    // Header
    let trHead = document.createElement("tr");
    
    // Theme-accurate jewel tone gradient: Deep Emerald -> Royal Blue -> Rich Violet
    trHead.style.background = "linear-gradient(90deg, #064e3b 0%, #1e3a8a 50%, #4a044e 100%)";
    
    // Kept the thick black outline & drop shadow so the big text still pops
    let outlineCSS = "-webkit-text-stroke: 1.5px #000; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;";
    
    trHead.innerHTML = `
        <th style="border:1px solid #10b981; padding:16px; font-weight:900; font-size:26px; letter-spacing:2px; text-transform:uppercase; color:#38bdf8; ${outlineCSS}">Dasha</th>
        <th style="border:1px solid #10b981; padding:16px; font-weight:900; font-size:26px; letter-spacing:2px; text-transform:uppercase; color:#f472b6; ${outlineCSS}">Bukthi</th>
        <th style="border:1px solid #10b981; padding:16px; font-weight:900; font-size:26px; letter-spacing:2px; text-transform:uppercase; color:#a855f7; ${outlineCSS}">Antara</th>
    `;
    table.appendChild(trHead);
	
	
	
	

    // Insert visual gap above the first Bukthi island
    let initialGap = document.createElement("tr");
    initialGap.innerHTML = `<td colspan="3" style="height:50px; border:none;"></td>`; // Changed 70px to 50px for the bottom gap
    table.appendChild(initialGap);

    let dPlanet = window.__dba3Dasha;
	
	
	
    let dIndex = DASHA_ORDER.indexOf(dPlanet);
    let bukthiOrder = [...DASHA_ORDER.slice(dIndex), ...DASHA_ORDER.slice(0, dIndex)];
    let dNums = getMixer3Nums(dPlanet, window.__dba3DashaP, window.__dba3DashaS);

    bukthiOrder.forEach((bPlanet, bIdx) => {
        let bIndex = DASHA_ORDER.indexOf(bPlanet);
        let antaraOrder = [...DASHA_ORDER.slice(bIndex), ...DASHA_ORDER.slice(0, bIndex)];
        let bNums = getMixer3Nums(bPlanet, window.__dba3BukthiP, window.__dba3BukthiS);

        antaraOrder.forEach(aPlanet => {
            let aNums = getMixer3Nums(aPlanet, window.__dba3AntaraP, window.__dba3AntaraS);
            let tr = document.createElement("tr");
            tr.style.background = "#010a08"; // Paint the data rows
            tr.innerHTML = `
                <td style="border:1px solid #10b981; padding:6px; font-weight:500; text-align:center;">
                    ${getPlanetLabel(dPlanet)} - <span style="color:#38bdf8;">${dNums}</span>
                </td>
                <td style="border:1px solid #10b981; padding:6px; font-weight:500; text-align:center;">
                    ${getPlanetLabel(bPlanet)} - <span style="color:#f472b6;">${bNums}</span>
                </td>
                <td style="border:1px solid #10b981; padding:6px; font-weight:500; text-align:center;">
                    ${getPlanetLabel(aPlanet)} - <span style="color:#a855f7;">${aNums}</span>
                </td>
            `;
            table.appendChild(tr);
        });

        // Insert visual gap (Island Split) after each Bukthi chunk of 9 rows, except the last one
        if (bIdx < bukthiOrder.length - 1) {
            let gap = document.createElement("tr");
            gap.innerHTML = `<td colspan="3" style="height:70px; border:none;"></td>`;
            table.appendChild(gap);
        }
    });

    innerWrap.appendChild(table);
}

if (typeof window.__oldBuildVim === "undefined") {
    window.__oldBuildVim = buildVimshottari;
    buildVimshottari = function() {
        window.__oldBuildVim();
        buildDashaBukthiAntaraMixer();
    };
}

setTimeout(buildDashaBukthiAntaraMixer, 100);
